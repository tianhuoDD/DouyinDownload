name: auto-dy2bili

on:
  schedule:
    - cron: "30 11 * * *"  # 19:30 北京时间
    - cron: "30 12 * * *"  # 20:30
    - cron: "30 13 * * *"  # 21:30
    - cron: "30 14 * * *"  # 22:30
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 缓存pip依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: 安装所需包
        run: pip install -r requirements.txt

      - name: 还原dy配置文件
        env:
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
        run: |
          python - <<'PYEOF'
          import os
          with open("config/douyin_config.example.yaml", "r", encoding="utf-8") as f:
              content = f.read()
          content = content.replace("__DOUYIN_COOKIE__", os.environ["DOUYIN_COOKIE"])
          with open("config/douyin_config.yaml", "w", encoding="utf-8") as f:
              f.write(content)
          PYEOF

      - name: 还原B站凭证文件
        env:
          BILIBILI_CREDENTIALS: ${{ secrets.BILIBILI_CREDENTIALS }}
        run: |
          python - <<'PYEOF'
          import os
          with open("config/bili_cookies.json", "w", encoding="utf-8") as f:
              f.write(os.environ["BILIBILI_CREDENTIALS"])
          PYEOF

      - name: 读取上传状态缓存
        uses: actions/cache@v4
        with:
          path: state/uploaded.json
          key: uploaded-state-${{ github.run_id }}
          restore-keys: uploaded-state-

      - name: 运行自动化脚本
        run: python auto_pipeline.py
        env:
          PYTHONIOENCODING: utf-8
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          BILIBILI_CREDENTIALS: ${{ secrets.BILIBILI_CREDENTIALS }}