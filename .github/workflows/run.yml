name: auto-dy2bili

on:
  schedule:
    - cron: "*/5 * * * *"  # 每3小时
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python auto_pipeline.py

      - name: Commit state
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add state/uploaded.json
          git commit -m "update state" || echo "no changes"
          git push
